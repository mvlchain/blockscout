name: Generate Image Tags

on:
  workflow_call:
    outputs:
      release-type:
        description: Release type based on branch (e.g. testnet, mainnet)
        value: ${{ jobs.generate.outputs.release_type }}
      image-tag:
        description: "Docker image tag"
        value: ${{ jobs.generate.outputs.image_tag }}

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      release_type: ${{ steps.vars.outputs.release_type }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - id: vars
        run: |
          SHA="${{ github.sha }}"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
            VERSION="${TAG_NAME#blockscout-}"
            RELEASE_TYPE="mainnet"
            IMAGE_TAG="${RELEASE_TYPE}-${VERSION}"
          else
            BRANCH="${{ github.ref_name }}"
            RELEASE_TYPE="${BRANCH}"
            IMAGE_TAG="${RELEASE_TYPE}-${SHA}"
          fi

          echo "release_type=${RELEASE_TYPE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
